<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>
</head>

<body>
  <div id="calculator-container">
    <div id="screen-container">
      <p id="screen">0123456789</p>
    </div>
    <div id="top-row-container">
      <button class="key funckey">AC</button>
      <button class="key funckey" disabled>+/-</button>
      <button class="key funckey" disabled>%</button>
      <button class="key funckey">/</button>
    </div>
    <div id="key-container">
      <div id="numkey-container">
        <button class="key numkey">9</button>
        <button class="key numkey">8</button>
        <button class="key numkey">7</button>
        <button class="key numkey">6</button>
        <button class="key numkey">5</button>
        <button class="key numkey">4</button>
        <button class="key numkey">3</button>
        <button class="key numkey">2</button>
        <button class="key numkey">1</button>
        <div id="zerodot-container">
          <button class="key numkey">0</button>
          <button class="key numkey">.</button>
        </div>
      </div>
      <div id="aside-container">
        <button class="key funckey">*</button>
        <button class="key funckey">-</button>
        <button class="key funckey">+</button>
        <button class="key funckey">=</button>
      </div>
    </div>
  </div>
</body>

</html>
